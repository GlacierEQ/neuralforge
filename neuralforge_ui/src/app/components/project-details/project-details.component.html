<div class="background-wrapper"></div>

<div *ngIf="project" class="project-header">
  <div class="project-title">
    <h1>{{ project?.name }}</h1>
    <mat-slide-toggle
      *ngIf="isProgrammedGoalProject"
      [checked]="notificationsEnabled"
      (change)="onToggleNotify()"
    >
      Notifications
    </mat-slide-toggle>
  </div>
  <p class="project-description">
    {{ project?.description || "No description available" }}
  </p>
</div>

<mat-tab-group *ngIf="!isLoading && !hasError && project">
  <mat-tab label="Overview">
    <ng-container *ngTemplateOutlet="overviewContent"></ng-container>
  </mat-tab>

  <mat-tab label="Generated Contents">
    <div class="empty-state">
      <p>No contents generated yet.</p>
    </div>
  </mat-tab>

  <mat-tab label="Configuration">
    <div class="config-actions">
      <button (click)="editProject.emit()" mat-stroked-button color="primary">
        Edit Project
      </button>
      <button (click)="deleteProject.emit()" mat-stroked-button color="warn">
        Delete Project
      </button>
    </div>
  </mat-tab>
</mat-tab-group>

<div *ngIf="isLoading" class="loading-container">
  <mat-icon>hourglass_empty</mat-icon>
  <p>Loading project...</p>
</div>

<div *ngIf="hasError" class="error-container">
  <mat-icon color="warn" class="error-icon">error_outline</mat-icon>
  <p class="error-message">{{ errorMessage }}</p>
</div>
